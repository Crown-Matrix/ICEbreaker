<!-- ╔══════════════════════════════════════════════════════════╗ -->
<!-- ║  ICEbreaker — Pre-Game Card  (drop-in snippet)          ║ -->
<!-- ║  All classes namespaced with  icb-pre__                 ║ -->
<!-- ║  Bootstrap utility classes (d-flex, gap-*, etc.) used   ║ -->
<!-- ║  Assumes Bootstrap 5 + Rajdhani + Share Tech Mono       ║ -->
<!-- ╚══════════════════════════════════════════════════════════╝ -->

<style>
  /* ── Pre-game card shell ── */
  #icb-pre-card {
    position: relative;
    z-index: 10;
    background: rgba(4,10,20,0.92);
    border: 1px solid rgba(0,255,255,0.18);
    backdrop-filter: blur(14px);
    clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 0 100%);
    animation: icbPreReveal 0.85s ease-out forwards;
    opacity: 0;
    max-width: 680px;
    width: 100%;
  }

  @keyframes icbPreReveal {
    from { opacity: 0; transform: translateY(18px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* top-right corner notch accent */
  #icb-pre-card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 22px; height: 22px;
    border-top:   1px solid #00CCDD;
    border-right: 1px solid #00CCDD;
    pointer-events: none;
  }

  /* ── Shared divider tint ── */
  .icb-pre__divider { border-color: rgba(0,255,255,0.18) !important; }

  /* ── Account row ── */
  .icb-pre__avatar {
    width: 40px; height: 40px;
    background: rgba(0,255,255,0.08);
    border: 1px solid rgba(0,255,255,0.30);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    clip-path: polygon(4px 0%, 100% 0%, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0% 100%, 0% 4px);
  }
  .icb-pre__avatar svg {
    width: 20px; height: 20px;
    stroke: #00CCDD; fill: none; stroke-width: 1.4;
  }

  .icb-pre__acct-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #00CCDD;
    text-transform: uppercase;
  }

  .icb-pre__acct-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(0,210,230,0.55);
    text-transform: uppercase;
  }

  /* ── Timeframe selector (top-right) ── */
  .icb-pre__tf-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,180,200,0.45);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .icb-pre__tf-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .icb-pre__tf-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(0,210,230,0.55);
    background: rgba(0,255,255,0.04);
    border: 1px solid rgba(0,255,255,0.18);
    padding: 3px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
    white-space: nowrap;
  }
  .icb-pre__tf-btn:hover {
    background: rgba(0,255,255,0.10);
    border-color: rgba(0,255,255,0.40);
    color: #00CCDD;
  }
  .icb-pre__tf-btn.icb-pre__tf-active {
    background: rgba(0,255,255,0.12);
    border-color: rgba(0,255,255,0.50);
    color: #00FFFF;
    text-shadow: 0 0 8px rgba(0,255,255,0.5);
  }

  /* ── Title block ── */
  .icb-pre__title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(48px, 9vw, 88px);
    letter-spacing: -1px;
    line-height: 1;
    text-transform: uppercase;
    position: relative;
  }

  .icb-pre__ice {
    color: #00FFFF;
    text-shadow:
      0 0 18px rgba(0,255,255,0.55),
      0 0 50px rgba(0,255,255,0.18),
      2px 2px 0px rgba(0,255,255,0.12);
    animation: icbPreFlicker 8s ease-in-out infinite;
  }

  /* glitch slice */
  .icb-pre__title::before {
    content: 'ICEbreaker';
    position: absolute; inset: 0;
    color: transparent;
    -webkit-text-stroke: 2px #FF2D78;
    clip-path: polygon(0 0, 100% 0, 100% 28%, 0 28%);
    opacity: 0.45;
    transform: translate(-2px, -2px);
    animation: icbPreGlitch1 6s 2s ease-in-out infinite;
    pointer-events: none;
  }

  .icb-pre__title::after {
    content: 'ICEbreaker';
    position: absolute; inset: 0;
    color: #FF2D78;
    opacity: 0;
    transform: translate(3px, 0);
    clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    animation: icbPreGlitch2 6s 2s ease-in-out infinite;
    pointer-events: none;
  }

  .icb-pre__breaker {
    color: #FF2D78;
    text-shadow:
      0 0 18px rgba(255,45,120,0.45),
      0 0 45px rgba(255,45,120,0.14);
  }

  @keyframes icbPreFlicker {
    0%,94%,96%,98%,100% { opacity: 1; }
    95%,97%              { opacity: 0.82; }
  }

  @keyframes icbPreGlitch1 {
    0%,88%,93%,100% { opacity:0.45; transform:translate(-2px,-2px); }
    89%             { opacity:0.8;  transform:translate(-6px,-2px); }
    90%             { opacity:0.4;  transform:translate(4px,-2px);  }
    91%,92%         { opacity:0; }
  }

  @keyframes icbPreGlitch2 {
    0%,88%,93%,100% { opacity:0; }
    89%             { opacity:0.6; transform:translate(6px,0); }
    90%             { opacity:0.3; transform:translate(-3px,0); }
    91%,92%         { opacity:0; }
  }

  .icb-pre__subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(9px, 1.3vw, 12px);
    letter-spacing: 6px;
    color: #00CCDD;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .icb-pre__subtitle::before,
  .icb-pre__subtitle::after { content:'//'; color:#FF2D78; opacity:0.55; margin:0 8px; font-size:0.9em; }

  /* ── Prompt message ── */
  .icb-pre__prompt {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,180,200,0.45);
    text-transform: uppercase;
    animation: icbPreBlink 2.7s step-end infinite;
  }

  @keyframes icbPreBlink {
    0%,100% { visibility: visible; }
    50%     { visibility: hidden; }
  }

  /* ── Start button ── */
  .icb-pre__start-btn {
    flex: 1;
    background: rgba(0,255,255,0.04);
    border: none;
    border-left: 2px solid rgba(0,255,255,0.35);
    cursor: pointer;
    transition: background 0.18s;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .icb-pre__start-btn:hover { background: rgba(0,255,255,0.10); }

  .icb-pre__start-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #00FFFF;
  }

  .icb-pre__start-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icb-pre__start-icon svg { width: 9px; height: 9px; fill: #00CCDD; }

  /* ── Bottom menu/settings icons ── */
  .icb-pre__ico-btn {
    width: 52px; height: 52px;
    background: transparent;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.18s;
    flex-shrink: 0;
  }
  .icb-pre__ico-btn:hover { background: rgba(0,255,255,0.07); }
  .icb-pre__ico-btn svg { width: 16px; height: 16px; stroke: #00CCDD; fill: none; stroke-width: 1.5; }
  .icb-pre__ico-btn--sepr { border-right: 1px solid rgba(0,255,255,0.18); }
  .icb-pre__ico-btn--sepl { border-left:  1px solid rgba(0,255,255,0.18); }

  /* ── Bottom bar wrapper ── */
  .icb-pre__bottom-bar {
    background: rgba(0,0,0,0.45);
    border-top: 1px solid rgba(0,255,255,0.18);
  }

  /* ── Decorative rule ── */
  .icb-pre__rule-line {
    height: 1px;
    flex: 1;
    max-width: 100px;
  }
  .icb-pre__rule-line--l { background: linear-gradient(90deg, transparent, #00CCDD); }
  .icb-pre__rule-line--r { background: linear-gradient(90deg, #00CCDD, transparent); }

  .icb-pre__rule-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: #00CCDD;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>

<!-- ═══════════════ PRE-GAME CARD ═══════════════ -->
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:2rem 1.25rem; position:relative; z-index:10;">

  <div id="icb-pre-card">

    <!-- ══ ACCOUNT + TIMEFRAME ROW ══ -->
    <div class="d-flex align-items-center gap-3 px-3 py-2 border-bottom icb-pre__divider">

      <!-- avatar + name -->
      <div class="icb-pre__avatar">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="d-flex flex-column gap-1">
        <span class="icb-pre__acct-name">Ghost_Operative</span>
        <span class="icb-pre__acct-tag">// Guest Session</span>
      </div>

      <!-- timeframe selector — top right -->
      <div class="ms-auto d-flex flex-column align-items-end gap-2">
        <span class="icb-pre__tf-label">Select Timeframe</span>
        <div class="icb-pre__tf-group">
          <button class="icb-pre__tf-btn" data-seconds="30">30s</button>
          <button class="icb-pre__tf-btn icb-pre__tf-active" data-seconds="45">45s</button>
          <button class="icb-pre__tf-btn" data-seconds="60">60s</button>
        </div>
      </div>

    </div>

    <!-- ══ TITLE BLOCK ══ -->
    <div class="d-flex flex-column align-items-center justify-content-center py-5 px-3 border-bottom icb-pre__divider text-center">

      <!-- decorative rule -->
      <div class="d-flex align-items-center gap-3 mb-4 w-100 justify-content-center">
        <div class="icb-pre__rule-line icb-pre__rule-line--l"></div>
        <span class="icb-pre__rule-text">Ready Operative</span>
        <div class="icb-pre__rule-line icb-pre__rule-line--r"></div>
      </div>

      <div class="icb-pre__title mb-2">
        <span class="icb-pre__ice">ICE</span><span class="icb-pre__breaker">breaker</span>
      </div>
      <div class="icb-pre__subtitle mb-4">Breach the Grid</div>

      <!-- blinking prompt -->
      <span class="icb-pre__prompt">[ Select your timeframe to begin ]</span>

    </div>

    <!-- ══ BOTTOM BAR ══ -->
    <div class="d-flex align-items-center icb-pre__bottom-bar">

      <button class="icb-pre__ico-btn icb-pre__ico-btn--sepr" aria-label="Menu">
        <svg viewBox="0 0 16 16">
          <line x1="2" y1="4"  x2="14" y2="4"/>
          <line x1="2" y1="8"  x2="14" y2="8"/>
          <line x1="2" y1="12" x2="14" y2="12"/>
        </svg>
      </button>

      <button class="icb-pre__start-btn" id="icb-pre-start-btn">
        <div class="icb-pre__start-icon">
          <svg viewBox="0 0 9 9"><path d="M2 1l6 3.5-6 3.5z"/></svg>
        </div>
        <span class="icb-pre__start-label">Start Run</span>
      </button>

      <button class="icb-pre__ico-btn icb-pre__ico-btn--sepl" aria-label="Settings">
        <svg viewBox="0 0 16 16">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/>
        </svg>
      </button>

    </div>

  </div>

</div>

<script>
  (function () {
    // Timeframe toggle — updates active state and stores selection
    const tfBtns = document.querySelectorAll('.icb-pre__tf-btn');
    let selectedSeconds = 45; // default

    tfBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tfBtns.forEach(b => b.classList.remove('icb-pre__tf-active'));
        btn.classList.add('icb-pre__tf-active');
        selectedSeconds = parseInt(btn.dataset.seconds, 10);
      });
    });

    // Start button — exposes chosen timeframe via custom event
    document.getElementById('icb-pre-start-btn').addEventListener('click', () => {
      document.dispatchEvent(new CustomEvent('icb:startRun', {
        detail: { seconds: selectedSeconds }
      }));
    });

    // Listen from parent page: document.addEventListener('icb:startRun', e => console.log(e.detail.seconds))
  })();
</script>
