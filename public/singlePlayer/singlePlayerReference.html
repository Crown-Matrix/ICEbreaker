<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICEbreaker</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cy-title-cyan: #00FFFF;
      --cy-title-cyan-dim: #00CCDD;
      --cy-title-red: #FF2D78;
      --cy-title-yellow: #FF2D78;
      --cy-title-dark: #050509;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
    }

    /* === BACKGROUND === */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-base {
      position: absolute;
      inset: 0;
      background-color: #000000;
      background-image: linear-gradient(to bottom, rgba(255, 0, 60, 0.10), rgba(4, 218, 246, 0.05));
      background-attachment: fixed;
    }

    /* grid pattern */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 40px 40px;
      }
    }

    /* data noise blobs */
    .bg-noise {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .noise-col {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: noiseScroll linear infinite;
      opacity: 0;
    }

    .noise-col span {
      display: block;
      width: 100%;
      background: var(--cy-title-red);
      border-radius: 1px;
    }

    @keyframes noiseScroll {
      0% {
        transform: translateY(-100%);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(100%);
        opacity: 0;
      }
    }

    /* scanlines */
    .bg-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 3px,
          rgba(255, 255, 255, 0.015) 3px,
          rgba(255, 255, 255, 0.015) 4px);
      pointer-events: none;
    }

    /* vignette */
    .bg-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 40%, rgba(0, 0, 0, 0.85) 100%);
    }

    /* === CONTENT === */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: contentReveal 1.2s ease-out forwards;
      opacity: 0;
    }

    @keyframes contentReveal {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* top bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      animation: fadeIn 0.8s 0.3s ease-out forwards;
      opacity: 0;
    }

    .top-bar-line {
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--cy-title-cyan-dim));
    }

    .top-bar-line.right {
      background: linear-gradient(90deg, var(--cy-title-cyan-dim), transparent);
    }

    .top-bar-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--cy-title-cyan-dim);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* logo */
    .logo-wrap {
      position: relative;
      line-height: 1;
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: clamp(80px, 14vw, 160px);
      text-transform: uppercase;
      letter-spacing: -2px;
      position: relative;
      color: var(--cy-title-cyan);
      text-shadow:
        0 0 20px rgba(0, 255, 255, 0.6),
        0 0 60px rgba(0, 255, 255, 0.2),
        2px 2px 0px rgba(0, 255, 255, 0.15);
      animation: logoFlicker 8s ease-in-out infinite;
    }

    /* red accent strokes — pseudo elements */
    .logo::before {
      content: 'ICEbreaker';
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-text-stroke: 2px var(--cy-title-red);
      clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
      opacity: 0.5;
      transform: translate(-2px, -2px);
      animation: glitchSlice1 6s 2s ease-in-out infinite;
    }

    .logo::after {
      content: 'ICEbreaker';
      position: absolute;
      inset: 0;
      color: var(--cy-title-red);
      opacity: 0;
      transform: translate(3px, 0);
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      animation: glitchSlice2 6s 2s ease-in-out infinite;
    }

    @keyframes logoFlicker {

      0%,
      94%,
      96%,
      98%,
      100% {
        opacity: 1;
      }

      95%,
      97% {
        opacity: 0.85;
      }
    }

    @keyframes glitchSlice1 {

      0%,
      88%,
      93%,
      100% {
        opacity: 0.5;
        transform: translate(-2px, -2px);
      }

      89% {
        opacity: 0.8;
        transform: translate(-6px, -2px);
      }

      90% {
        opacity: 0.4;
        transform: translate(4px, -2px);
      }

      91%,
      92% {
        opacity: 0;
      }
    }

    @keyframes glitchSlice2 {

      0%,
      88%,
      93%,
      100% {
        opacity: 0;
      }

      89% {
        opacity: 0.6;
        transform: translate(6px, 0);
      }

      90% {
        opacity: 0.3;
        transform: translate(-3px, 0);
      }

      91%,
      92% {
        opacity: 0;
      }
    }

    /* ICE vs breaker split color */
    .logo .ice {
      color: var(--cy-title-cyan);
    }

    .logo .breaker {
      color: var(--cy-title-red);
      text-shadow:
        0 0 20px rgba(255, 45, 120, 0.5),
        0 0 50px rgba(255, 45, 120, 0.15);
    }

    /* subtitle */
    .subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(13px, 2vw, 18px);
      color: var(--cy-title-cyan-dim);
      letter-spacing: 10px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: 0.8;
      animation: fadeIn 0.8s 0.8s ease-out forwards;
      opacity: 0;
      position: relative;
    }

    .subtitle::before,
    .subtitle::after {
      content: '//';
      color: var(--cy-title-red);
      opacity: 0.6;
      margin: 0 10px;
      font-size: 0.85em;
    }

    /* bottom data row */
    .data-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 32px;
      animation: fadeIn 0.8s 1.1s ease-out forwards;
      opacity: 0;
    }

    .data-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .data-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: rgba(0, 255, 255, 0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .data-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--cy-title-cyan-dim);
      letter-spacing: 2px;
    }

    .data-sep {
      width: 1px;
      height: 28px;
      background: rgba(0, 255, 255, 0.15);
    }

    /* press start */
    .press-start {
      margin-top: 52px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--cy-title-red);
      animation: blink 2.718282s 1.5s step-end infinite, fadeIn 0.8s 1.5s ease-out forwards;
      opacity: 0;
    }

    @keyframes blink {

      0%,
      100% {
        visibility: visible;
      }

      50% {
        visibility: hidden;
      }
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }


    /* horizontal accent lines */
    .h-accent {
      position: fixed;
      left: 0;
      right: 0;
      height: 1px;
      z-index: 5;
    }

    .h-accent.top {
      top: 60px;
      background: linear-gradient(90deg, transparent 5%, rgba(0, 255, 255, 0.12) 30%, rgba(255, 230, 0, 0.2) 50%, rgba(0, 255, 255, 0.12) 70%, transparent 95%);
    }

    .h-accent.bottom {
      bottom: 60px;
      background: linear-gradient(90deg, transparent 5%, rgba(0, 255, 255, 0.08) 30%, rgba(255, 71, 57, 0.15) 50%, rgba(0, 255, 255, 0.08) 70%, transparent 95%);
    }

    /* side text */
    .side-text {
      position: fixed;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0, 255, 255, 0.2);
      text-transform: uppercase;
      z-index: 5;
    }

    .side-text.left {
      left: 24px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: center center;
    }

    .side-text.right {
      right: 24px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      transform-origin: center center;
    }
  </style>
</head>

<body>

  <!-- BG layers -->
  <div class="bg">
    <div class="bg-base"></div>
    <div class="bg-grid"></div>
    <div class="bg-noise" id="noise"></div>
    <div class="bg-scanlines"></div>
    <div class="bg-vignette"></div>
  </div>

  <!-- Accent lines -->
  <div class="h-accent top"></div>
  <div class="h-accent bottom"></div>

  <!-- Side text -->
  <div class="side-text left">SYS://NETWORK INTRUSION PROTOCOL v4.7</div>
  <div class="side-text right">CLASSIFICATION: ULTRA-BLACK // AUTHORIZED ONLY</div>


  <!-- Main content -->
  <div class="content">
    <div class="top-bar">
      <div class="top-bar-line"></div>
      <span class="top-bar-text">Single Player</span>
      <div class="top-bar-line right"></div>
    </div>

    <div class="logo-wrap">
      <div class="logo">
        <span class="ice">ICE</span><span class="breaker">breaker</span>
      </div>
    </div>

    <div class="subtitle">Breach the Grid</div>

    <div class="data-row">
      <div class="data-item">
        <span class="data-label">Protocol</span>
        <span class="data-value">BLACK ICE</span>
      </div>
      <div class="data-sep"></div>
      <div class="data-item">
        <span class="data-label">Threat Level</span>
        <span class="data-value">CRITICAL</span>
      </div>
      <div class="data-sep"></div>
      <div class="data-item">
        <span class="data-label">Node Status</span>
        <span class="data-value">EXPOSED</span>
      </div>
    </div>

    <div class="press-start">[ Press Any Key ]</div>
  </div>
  <script type="module">
    import *  as audioModule from '/js/audio.js';
    await audioModule.initAudio();
    audioModule.startCover();


function attachImageCursor(imgSrc, size = 32) {
    const cursor = document.createElement('img');
    cursor.src = imgSrc;
    cursor.id = 'image-cursor';
    cursor.style.cssText = `
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            display: none;
            width: ${size}px;
            height: ${size}px;
        `;
    document.body.appendChild(cursor);

    document.addEventListener('mousemove', (e) => {
        cursor.style.display = 'block';
        cursor.style.left = `${e.clientX}px`;
        cursor.style.top = `${e.clientY}px`;
    });

    return cursor; // return ref to be able to remove/resize it later
}

document.body.style.cssText += `cursor: none !important;`;
if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {

    const style = document.createElement('style');
    style.textContent = '* { cursor: none !important; }';
    document.head.appendChild(style);

    attachImageCursor('/imgs/blueSquare.png', 32);
}

if (window.matchMedia('(hover: none) and (pointer: coarse)').matches) {
    document.body.style.cursor = 'default';
    removeImageCursor();
}

function removeImageCursor() {
    const cursor = document.getElementById('image-cursor');
    cursor?.remove();
}



    const noise = document.getElementById('noise');
    const count = 30;
    for (let i = 0; i < count; i++) {
      const col = document.createElement('div');
      col.className = 'noise-col';
      col.style.left = Math.random() * 100 + '%';
      col.style.animationDuration = (6 + Math.random() * 12) + 's';
      col.style.animationDelay = (Math.random() * 10) + 's';
      const spanCount = Math.floor(4 + Math.random() * 10);
      for (let j = 0; j < spanCount; j++) {
        const s = document.createElement('span');
        s.style.height = Math.floor(4 + Math.random() * 20) + 'px';
        col.appendChild(s);
      }
      noise.appendChild(col);
    }


    function goToPage(url) {
      fetch(url)
        .then(res => {
          if (res.ok) return res.text();
          throw new Error('Network response was not ok');
        })
        .then(html => {
          history.pushState({}, "", url);

          const parser = new DOMParser();
          const newDoc = parser.parseFromString(html, 'text/html');

          document.head.replaceWith(newDoc.head);
          document.body.replaceWith(newDoc.body);

          // Run scripts sequentially
          const scripts = [...document.body.querySelectorAll('script')];
          return scripts.reduce((chain, oldScript) => {
            return chain.then(() => new Promise((resolve, reject) => {
              const newScript = document.createElement('script');

              [...oldScript.attributes].forEach(attr =>
                newScript.setAttribute(attr.name, attr.value)
              );
              newScript.textContent = oldScript.textContent;

              if (oldScript.src) {
                newScript.onload = resolve;
                newScript.onerror = reject;
              } else {
                resolve();
              }

              oldScript.replaceWith(newScript);
            }));
          }, Promise.resolve());
        }).then(() => {
          document.body.style.visibility = 'visible';
        })
        .catch(err => {
          console.error('Failed to load page:', err);
          window.location.replace(url);
        });
    }
    function handleKeydown(event) {
      if (['Control', 'Shift', 'Alt', 'Meta', 'Escape', 'CapsLock', 'Tab'].includes(event.key) || event.key[0] === 'F') {
        return; // ignore modifier keys
      }
      document.removeEventListener('keydown', handleKeydown);
      goToPage('/singlePlayer/singlePlayerIndex.html');
    }
    document.addEventListener('keydown', handleKeydown);

  </script>


</body>

</html>
