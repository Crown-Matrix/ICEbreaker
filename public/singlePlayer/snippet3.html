<!-- ╔══════════════════════════════════════════════════════════╗ -->
<!-- ║  ICEbreaker — Pre-Game Card  (drop-in snippet)          ║ -->
<!-- ║  All classes namespaced with  icb-pre__                 ║ -->
<!-- ║  Bootstrap utility classes (d-flex, gap-*, etc.) used   ║ -->
<!-- ║  Assumes Bootstrap 5 + Rajdhani + Share Tech Mono       ║ -->
<!-- ╚══════════════════════════════════════════════════════════╝ -->

<style>
  /* ── Pre-game card shell ── */
  #icb-pre-card {
    position: relative;
    z-index: 10;
    background: rgba(4,10,20,0.92);
    border: 1px solid rgba(0,255,255,0.18);
    backdrop-filter: blur(14px);
    clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 0 100%);
    animation: icbPreReveal 0.85s ease-out forwards;
    opacity: 0;
    max-width: 680px;
    width: 100%;
  }

  @keyframes icbPreReveal {
    from { opacity: 0; transform: translateY(18px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* top-right corner notch accent */
  #icb-pre-card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 22px; height: 22px;
    border-top:   1px solid #00CCDD;
    border-right: 1px solid #00CCDD;
    pointer-events: none;
  }

  /* ── Shared divider tint ── */
  .icb-pre__divider { border-color: rgba(0,255,255,0.18) !important; }

  /* ── Logo in header ── */
  .icb-pre__header-logo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 4vw, 32px);
    letter-spacing: -0.5px;
    line-height: 1;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .icb-pre__header-ice {
    color: #00FFFF;
    text-shadow:
      0 0 12px rgba(0,255,255,0.5),
      0 0 30px rgba(0,255,255,0.15);
    animation: icbPreFlicker 8s ease-in-out infinite;
  }

  .icb-pre__header-breaker {
    color: #FF2D78;
    text-shadow:
      0 0 12px rgba(255,45,120,0.4),
      0 0 28px rgba(255,45,120,0.12);
  }

  .icb-pre__header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 4px;
    color: rgba(0,204,221,0.6);
    text-transform: uppercase;
    display: block;
    margin-top: 2px;
  }
  .icb-pre__header-sub::before { content:'// '; color:#FF2D78; opacity:0.55; }

  /* ── Timeframe selector ── */
  .icb-pre__tf-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,180,200,0.45);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .icb-pre__tf-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .icb-pre__tf-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(0,210,230,0.55);
    background: rgba(0,255,255,0.04);
    border: 1px solid rgba(0,255,255,0.18);
    padding: 3px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
    white-space: nowrap;
  }
  .icb-pre__tf-btn:hover {
    background: rgba(0,255,255,0.10);
    border-color: rgba(0,255,255,0.40);
    color: #00CCDD;
  }
  .icb-pre__tf-btn.icb-pre__tf-active {
    background: rgba(0,255,255,0.12);
    border-color: rgba(0,255,255,0.50);
    color: #00FFFF;
    text-shadow: 0 0 8px rgba(0,255,255,0.5);
  }

  /* ── Prompt message ── */
  .icb-pre__prompt {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,180,200,0.45);
    text-transform: uppercase;
    animation: icbPreBlink 2.7s step-end infinite;
  }

  @keyframes icbPreBlink {
    0%,100% { visibility: visible; }
    50%     { visibility: hidden; }
  }

  /* ── Start button ── */
  .icb-pre__start-btn {
    flex: 1;
    background: rgba(0,255,255,0.04);
    border: none;
    border-left: 2px solid rgba(0,255,255,0.35);
    cursor: pointer;
    transition: background 0.18s;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .icb-pre__start-btn:hover { background: rgba(0,255,255,0.10); }

  .icb-pre__start-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #00FFFF;
  }

  .icb-pre__start-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(0,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icb-pre__start-icon svg { width: 9px; height: 9px; fill: #00CCDD; }

  /* ── Bottom menu/settings icons ── */
  .icb-pre__ico-btn {
    width: 52px; height: 52px;
    background: transparent;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.18s;
    flex-shrink: 0;
  }
  .icb-pre__ico-btn:hover { background: rgba(0,255,255,0.07); }
  .icb-pre__ico-btn svg { width: 16px; height: 16px; stroke: #00CCDD; fill: none; stroke-width: 1.5; }
  .icb-pre__ico-btn--sepl { border-left:  1px solid rgba(0,255,255,0.18); }

  /* ── Bottom bar wrapper ── */
  .icb-pre__bottom-bar {
    background: rgba(0,0,0,0.45);
    border-top: 1px solid rgba(0,255,255,0.18);
  }

  /* ── Decorative rule ── */
  .icb-pre__rule-line {
    height: 1px;
    flex: 1;
    max-width: 100px;
  }
  .icb-pre__rule-line--l { background: linear-gradient(90deg, transparent, #00CCDD); }
  .icb-pre__rule-line--r { background: linear-gradient(90deg, #00CCDD, transparent); }

  .icb-pre__rule-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: #00CCDD;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>

<!-- ═══════════════ PRE-GAME CARD ═══════════════ -->
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; padding:2rem 1.25rem; position:relative; z-index:10;">

  <div id="icb-pre-card">

    <!-- ══ HEADER: position:relative container, logo absolute top-right ══ -->
    <div class="border-bottom icb-pre__divider px-3 py-2" style="position:relative; min-height:56px;">

      <!-- gear — top left, sits in normal flow -->
      <button class="icb-pre__ico-btn" aria-label="Settings" style="width:40px;height:40px;vertical-align:top;">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M6.5 1.5h3l.4 1.6a4.5 4.5 0 0 1 1.1.65l1.55-.5 1.5 2.6-1.2 1.1a4.6 4.6 0 0 1 0 1.1l1.2 1.1-1.5 2.6-1.55-.5a4.5 4.5 0 0 1-1.1.65l-.4 1.6h-3l-.4-1.6a4.5 4.5 0 0 1-1.1-.65l-1.55.5-1.5-2.6 1.2-1.1a4.6 4.6 0 0 1 0-1.1l-1.2-1.1 1.5-2.6 1.55.5a4.5 4.5 0 0 1 1.1-.65z" stroke="#00CCDD" stroke-width="1.2" stroke-linejoin="round"/>
          <circle cx="8" cy="8" r="2" stroke="#00CCDD" stroke-width="1.2"/>
        </svg>
      </button>

      <!-- timeframe — centered via absolute so it doesn't push the logo -->
      <div class="d-flex flex-column align-items-center gap-2" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);">
        <span class="icb-pre__tf-label">Select Timeframe</span>
        <div class="icb-pre__tf-group">
          <button class="icb-pre__tf-btn" data-seconds="30">30s</button>
          <button class="icb-pre__tf-btn icb-pre__tf-active" data-seconds="45">45s</button>
          <button class="icb-pre__tf-btn" data-seconds="60">60s</button>
        </div>
      </div>

      <!-- logo — absolute TOP-RIGHT corner -->
      <div class="d-flex flex-column align-items-end" style="position:absolute; top:8px; right:12px; text-align:right;">
        <div><span class="icb-pre__header-ice">ICE</span><span class="icb-pre__header-breaker">breaker</span></div>
        <span class="icb-pre__header-sub">Breach the Grid</span>
      </div>

    </div>

    <!-- ══ BODY: decorative rule + prompt ══ -->
    <div class="d-flex flex-column align-items-center justify-content-center py-5 px-3 border-bottom icb-pre__divider text-center">

      <!-- decorative rule -->
      <div class="d-flex align-items-center gap-3 mb-4 w-100 justify-content-center">
        <div class="icb-pre__rule-line icb-pre__rule-line--l"></div>
        <span class="icb-pre__rule-text">Ready Operative</span>
        <div class="icb-pre__rule-line icb-pre__rule-line--r"></div>
      </div>

      <!-- blinking prompt -->
      <span class="icb-pre__prompt">[ Select your timeframe to begin ]</span>

    </div>

    <!-- ══ BOTTOM BAR ══ -->
    <div class="d-flex align-items-center icb-pre__bottom-bar">

      <button class="icb-pre__start-btn" id="icb-pre-start-btn">
        <div class="icb-pre__start-icon">
          <svg viewBox="0 0 9 9"><path d="M2 1l6 3.5-6 3.5z"/></svg>
        </div>
        <span class="icb-pre__start-label">Start Run</span>
      </button>

    </div>

  </div>

</div>

<script>
  (function () {
    // Timeframe toggle — updates active state and stores selection
    const tfBtns = document.querySelectorAll('.icb-pre__tf-btn');
    let selectedSeconds = 45; // default

    tfBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tfBtns.forEach(b => b.classList.remove('icb-pre__tf-active'));
        btn.classList.add('icb-pre__tf-active');
        selectedSeconds = parseInt(btn.dataset.seconds, 10);
      });
    });

    // Start button — exposes chosen timeframe via custom event
    document.getElementById('icb-pre-start-btn').addEventListener('click', () => {
      document.dispatchEvent(new CustomEvent('icb:startRun', {
        detail: { seconds: selectedSeconds }
      }));
    });

    // Listen from parent page: document.addEventListener('icb:startRun', e => console.log(e.detail.seconds))
  })();
</script>
