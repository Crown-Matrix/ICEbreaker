<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICEbreaker — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --cy-cyan: #00FFFF;
      --cy-cyan-dim: #00CCDD;
      --cy-cyan-glow: rgba(0, 255, 255, 0.35);
      --cy-red: #FF2D78;
      --cy-red-dim: rgba(255, 45, 120, 0.7);
      --cy-panel: rgba(4, 10, 20, 0.92);
      --cy-border: rgba(0, 255, 255, 0.18);
      --cy-border-mid: rgba(0, 255, 255, 0.30);
      --cy-text-dim: rgba(0, 210, 230, 0.55);
      --cy-text-muted: rgba(0, 180, 200, 0.35);
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Rajdhani', sans-serif;
    }

    html, body {
      height: 100%;
      background-color: #000;
      background-image: linear-gradient(to bottom, rgba(255, 0, 60, 0.09), rgba(4, 218, 246, 0.04));
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 3px,
        rgba(255, 255, 255, 0.012) 3px, rgba(255, 255, 255, 0.012) 4px);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridShift { to { background-position: 40px 40px; } }

    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 35%, rgba(0,0,0,0.92) 100%);
      pointer-events: none; z-index: 0;
    }

    .side-label {
      position: fixed; font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 3px; color: rgba(0,255,255,0.16); text-transform: uppercase;
      pointer-events: none; z-index: 1;
    }
    .side-label.left  { left: 18px;  top: 50%; transform: translateY(-50%) rotate(-90deg); }
    .side-label.right { right: 18px; top: 50%; transform: translateY(-50%) rotate(90deg); }

    .h-accent { position: fixed; left: 0; right: 0; height: 1px; pointer-events: none; z-index: 1; }
    .h-accent.top    { top: 48px;    background: linear-gradient(90deg, transparent 5%, rgba(0,255,255,0.10) 30%, rgba(255,45,120,0.16) 50%, rgba(0,255,255,0.10) 70%, transparent 95%); }
    .h-accent.bottom { bottom: 48px; background: linear-gradient(90deg, transparent 5%, rgba(0,255,255,0.07) 30%, rgba(255,71,57,0.12)  50%, rgba(0,255,255,0.07) 70%, transparent 95%); }

    .cy-card {
      position: relative; z-index: 10;
      background: var(--cy-panel);
      border: 1px solid var(--cy-border);
      backdrop-filter: blur(14px);
      clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 0 100%);
      animation: cardReveal 0.85s ease-out forwards;
      opacity: 0;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(18px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0)    scale(1);     }
    }

    .cy-card::before {
      content: ''; position: absolute; top: 0; right: 0;
      width: 22px; height: 22px;
      border-top: 1px solid var(--cy-cyan-dim);
      border-right: 1px solid var(--cy-cyan-dim);
      pointer-events: none;
    }

    .cy-divider { border-color: var(--cy-border) !important; }

    .ov-header {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 4px; color: var(--cy-text-dim); text-transform: uppercase;
    }

    .game-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(36px,7vw,68px); letter-spacing: -1px; line-height: 1; text-transform: uppercase; }
    .title-ice { color: var(--cy-cyan); text-shadow: 0 0 18px rgba(0,255,255,0.55), 0 0 50px rgba(0,255,255,0.18); animation: titleFlicker 8s ease-in-out infinite; }
    .title-breaker { color: var(--cy-red); text-shadow: 0 0 18px rgba(255,45,120,0.45), 0 0 45px rgba(255,45,120,0.14); }

    @keyframes titleFlicker {
      0%,94%,96%,98%,100% { opacity:1; }
      95%,97%             { opacity:0.82; }
    }

    .title-sub {
      font-family: var(--font-mono); font-size: clamp(9px,1.4vw,11px);
      letter-spacing: 6px; color: var(--cy-cyan-dim); text-transform: uppercase; opacity: 0.7;
    }
    .title-sub::before, .title-sub::after { content: '//'; color: var(--cy-red); opacity: 0.55; margin: 0 8px; font-size: 0.9em; }

    /* ── FORM FIELDS ── */
    .cy-field-wrap {
      position: relative;
    }

    .cy-field-label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px;
      color: var(--cy-text-muted); text-transform: uppercase; display: block;
      margin-bottom: 6px;
    }

    .cy-input {
      width: 100%;
      background: rgba(0, 255, 255, 0.03);
      border: 1px solid var(--cy-border);
      border-left: 2px solid var(--cy-cyan-dim);
      color: var(--cy-cyan-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      letter-spacing: 1px;
    }

    .cy-input::placeholder { color: var(--cy-text-muted); }

    .cy-input:focus {
      border-color: var(--cy-cyan-dim);
      border-left-color: var(--cy-cyan);
      background: rgba(0, 255, 255, 0.06);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.08);
    }

    .cy-input.error {
      border-color: rgba(255, 45, 120, 0.5);
      border-left-color: var(--cy-red);
      background: rgba(255, 45, 120, 0.04);
    }

    .cy-input.success {
      border-color: rgba(0, 255, 157, 0.4);
      border-left-color: #00FF9D;
    }

    .field-hint {
      font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px;
      color: var(--cy-text-muted); text-transform: uppercase; margin-top: 4px;
      min-height: 14px; transition: color 0.2s;
    }

    .field-hint.err { color: var(--cy-red); }
    .field-hint.ok  { color: #00FF9D; }

    /* strength bar */
    .strength-bar-wrap { display: flex; gap: 3px; margin-top: 6px; }
    .strength-seg {
      height: 3px; flex: 1;
      background: rgba(0,255,255,0.08);
      transition: background 0.3s;
    }
    .strength-seg.weak   { background: var(--cy-red); }
    .strength-seg.medium { background: #FFB800; }
    .strength-seg.strong { background: #00FF9D; }

    /* ── SUBMIT BTN ── */
    .cy-submit {
      width: 100%; background: rgba(0,255,255,0.04);
      border: 1px solid var(--cy-border-mid);
      border-left: 2px solid var(--cy-cyan);
      color: var(--cy-cyan); font-family: var(--font-display);
      font-weight: 700; font-size: 15px; letter-spacing: 4px;
      text-transform: uppercase; padding: 14px;
      cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }

    .cy-submit::before {
      content: ''; position: absolute; left: -100%; top: 0;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,255,255,0.06), transparent);
      transition: left 0.4s;
    }

    .cy-submit:hover { background: rgba(0,255,255,0.09); box-shadow: 0 0 18px rgba(0,255,255,0.1); }
    .cy-submit:hover::before { left: 150%; }
    .cy-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── GLITCH BAR ── */
    .glitch-static {
      position: relative; background: transparent; overflow: hidden;
    }
    .glitch-static::before, .glitch-static::after {
      content: ''; position: absolute; inset: 0;
      background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, var(--cy-cyan) 3px, var(--cy-cyan) 4px);
      background-size: 100% 8px; opacity: 0.08;
    }
    .glitch-static::after {
      background-size: 100% 13px; opacity: 0.05;
      animation: glitch-shift 0.3s steps(1) infinite;
    }
    @keyframes glitch-shift {
      0%  { transform: translateX(0)   translateY(0);  }
      20% { transform: translateX(-3px) translateY(1px); }
      40% { transform: translateX(2px)  translateY(-1px); }
      60% { transform: translateX(-1px) translateY(2px); }
      80% { transform: translateX(3px)  translateY(0);  }
      100%{ transform: translateX(0)   translateY(0);  }
    }

    /* ── LINK ── */
    .cy-link {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px;
      color: var(--cy-text-dim); text-transform: uppercase; text-decoration: none;
      transition: color 0.2s;
    }
    .cy-link:hover { color: var(--cy-cyan-dim); }
    .cy-link span { color: var(--cy-cyan-dim); }

    /* ── BOTTOM BAR ── */
    .bottom-bar { background: rgba(0,0,0,0.45); border-top: 1px solid var(--cy-border); }

    .cy-close {
      width: 20px; height: 20px; border: 1px solid rgba(255,45,120,0.3);
      background: transparent; color: var(--cy-red); font-family: var(--font-mono);
      font-size: 10px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.18s; flex-shrink: 0;
    }
    .cy-close:hover { background: rgba(255,45,120,0.15); }

    /* scroll for small screens */
    .scroll-outer {
      min-height: 100vh; position: relative; z-index: 10;
      padding: 2rem 1.25rem;
      display: flex; align-items: center; justify-content: center;
      overflow-y: auto;
    }

    /* toast */
    .cy-toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--cy-panel); border: 1px solid var(--cy-border);
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px;
      color: var(--cy-cyan-dim); padding: 10px 20px; z-index: 999;
      opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none;
      text-transform: uppercase;
    }
    .cy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .cy-toast.err  { border-color: rgba(255,45,120,0.4); color: var(--cy-red); }
  </style>
</head>
<body>

<div class="vignette"></div>
<div class="h-accent top"></div>
<div class="h-accent bottom"></div>
<div class="side-label left">SYS://IDENTITY REGISTRATION // GRID-NODE ALPHA-7</div>
<div class="side-label right">CLASSIFICATION: ULTRA-BLACK // NEW OPERATIVE</div>

<div class="scroll-outer">
  <div class="cy-card w-100" style="max-width:520px;">

    <!-- header row -->
    <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom cy-divider">
      <span class="ov-header">// New Operative Registration</span>
      <button class="cy-close" onclick="window.location.href='./singlePlayer'">✕</button>
    </div>

    <!-- glitch bar -->
    <div class="glitch-static px-3 py-2 border-bottom cy-divider"></div>

    <!-- title -->
    <div class="d-flex flex-column align-items-center justify-content-center pt-4 pb-3 px-3 border-bottom cy-divider text-center">
      <div class="d-flex align-items-center gap-3 mb-3 w-100 justify-content-center">
        <div style="flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--cy-cyan-dim));max-width:80px;"></div>
        <span style="font-family:var(--font-mono);font-size:9px;letter-spacing:4px;color:var(--cy-cyan-dim);text-transform:uppercase;">Access Request</span>
        <div style="flex:1;height:1px;background:linear-gradient(90deg,var(--cy-cyan-dim),transparent);max-width:80px;"></div>
      </div>
      <div class="game-title mb-1"><span class="title-ice">ICE</span><span class="title-breaker">breaker</span></div>
      <div class="title-sub">Create Operative Profile</div>
    </div>

    <!-- form -->
    <div class="px-4 py-4 border-bottom cy-divider d-flex flex-column gap-3">

      <div class="cy-field-wrap">
        <label class="cy-field-label" for="username">// Operative Handle</label>
        <input class="cy-input" type="text" id="username" placeholder="e.g. Ghost_7" maxlength="64" autocomplete="off" spellcheck="false">
        <div class="field-hint" id="username-hint">3–64 characters. Letters, numbers, underscores.</div>
      </div>

      <div class="cy-field-wrap">
        <label class="cy-field-label" for="password">// Access Code</label>
        <input class="cy-input" type="password" id="password" placeholder="Min. 8 characters" maxlength="64" autocomplete="new-password">
        <div class="strength-bar-wrap">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="field-hint" id="password-hint">Enter access code.</div>
      </div>

      <div class="cy-field-wrap">
        <label class="cy-field-label" for="confirm">// Confirm Access Code</label>
        <input class="cy-input" type="password" id="confirm" placeholder="Repeat access code" maxlength="64" autocomplete="new-password">
        <div class="field-hint" id="confirm-hint"></div>
      </div>

    </div>

    <!-- submit -->
    <div class="px-4 py-3 border-bottom cy-divider">
      <button class="cy-submit" id="submit-btn" disabled>Initialize Account</button>
    </div>

    <!-- footer link -->
    <div class="bottom-bar d-flex align-items-center justify-content-center py-3">
      <a href="/auth/log-in.html" class="cy-link">Already have access? <span>// Log In</span></a>
    </div>

  </div>
</div>

<div class="cy-toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const confirmInput  = document.getElementById('confirm');
  const submitBtn     = document.getElementById('submit-btn');
  const usernameHint  = document.getElementById('username-hint');
  const passwordHint  = document.getElementById('password-hint');
  const confirmHint   = document.getElementById('confirm-hint');
  const segs          = [1,2,3,4].map(i => document.getElementById('s'+i));

  function scorePassword(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw) || /[0-9]/.test(pw)) score++;
    return score; // 0-4
  }

  function updateStrengthBar(score) {
    const levels = ['','weak','weak','medium','strong'];
    segs.forEach((s,i) => {
      s.className = 'strength-seg';
      if (i < score) s.classList.add(levels[score]);
    });
    const labels = ['','Weak','Weak','Moderate','Strong'];
    passwordHint.textContent = score === 0 ? 'Enter access code.' : `Strength: ${labels[score]}`;
    passwordHint.className = 'field-hint' + (score < 2 && passwordInput.value ? ' err' : score >= 3 ? ' ok' : '');
  }

  function validateUsername() {
    const v = usernameInput.value.trim();
    if (!v) { usernameHint.textContent = '3–64 characters. Letters, numbers, underscores.'; usernameHint.className = 'field-hint'; usernameInput.className = 'cy-input'; return false; }
    if (v.length < 3) { usernameHint.textContent = 'Too short.'; usernameHint.className = 'field-hint err'; usernameInput.className = 'cy-input error'; return false; }
    if (!/^[A-Za-z0-9_]+$/.test(v)) { usernameHint.textContent = 'Invalid characters detected.'; usernameHint.className = 'field-hint err'; usernameInput.className = 'cy-input error'; return false; }
    usernameHint.textContent = 'Handle available.'; usernameHint.className = 'field-hint ok'; usernameInput.className = 'cy-input success'; return true;
  }

  function validateConfirm() {
    if (!confirmInput.value) { confirmHint.textContent = ''; confirmHint.className = 'field-hint'; confirmInput.className = 'cy-input'; return false; }
    if (confirmInput.value !== passwordInput.value) { confirmHint.textContent = 'Codes do not match.'; confirmHint.className = 'field-hint err'; confirmInput.className = 'cy-input error'; return false; }
    confirmHint.textContent = 'Codes match.'; confirmHint.className = 'field-hint ok'; confirmInput.className = 'cy-input success'; return true;
  }

  function checkSubmit() {
    const uOk = validateUsername();
    const pOk = scorePassword(passwordInput.value) >= 1 && passwordInput.value.length >= 8;
    const cOk = validateConfirm();
    submitBtn.disabled = !(uOk && pOk && cOk);
  }

  usernameInput.addEventListener('input', checkSubmit);
  passwordInput.addEventListener('input', () => { updateStrengthBar(scorePassword(passwordInput.value)); if (confirmInput.value) validateConfirm(); checkSubmit(); });
  confirmInput.addEventListener('input',  checkSubmit);

  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'cy-toast show' + (isErr ? ' err' : '');
    setTimeout(() => { t.className = 'cy-toast' + (isErr ? ' err' : ''); }, 3000);
  }

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Initializing...';
    try {
      const res = await fetch('/auth/sign-up', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usernameInput.value.trim(), password: passwordInput.value })
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        showToast('Account initialized. Redirecting...');
        setTimeout(() => window.location.replace('/auth/log-in'), 1600);
      } else {
        showToast(data.message || 'Registration failed.', true);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Initialize Account';
      }
    } catch (e) {
      showToast('Network error.', true);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Initialize Account';
    }
  });
</script>
</body>
</html>
